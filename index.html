<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Инженерный симулятор ЛОСь</title>
    
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    
    <link rel="icon" type="image/png" href="favicon.png">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: -apple-system, system-ui, Helvetica, Arial, sans-serif; margin: 0; padding: 15px; background-color: #f0f2f5; color: #333; }
        .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: 0 auto; }
        h1 { font-size: 20px; text-align: center; color: #2c3e50; margin-bottom: 20px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        input[type="range"] { width: 100%; height: 8px; border-radius: 5px; background: #ddd; outline: none; -webkit-appearance: none; }
        .value-display { text-align: right; font-weight: bold; color: #007bff; margin-top: 5px; }
        .result-box { background: #eef7ff; border-left: 5px solid #007bff; padding: 15px; border-radius: 4px; margin-top: 20px; }
        canvas { margin-top: 20px; background: #fff; }
    </style>
</head>
<body>

<div class="card">
    <h1>Инженерный разбор: Проект ЛОСь</h1>
    
    <div class="input-group">
        <label>Глубина монтажа (м):</label>
        <input type="range" id="depth" min="0.5" max="3" step="0.1" value="1.5">
        <div id="depthVal" class="value-display">1.5 м</div>
    </div>

    <div class="input-group">
        <label>Диаметр установки (м):</label>
        <input type="range" id="diameter" min="0.5" max="2.5" step="0.1" value="1.2">
        <div id="diamVal" class="value-display">1.2 м</div>
    </div>

    <div class="input-group">
        <label>Юбка-грунтозацеп (мм):</label>
        <input type="range" id="skirt" min="0" max="500" step="10" value="200">
        <div id="skirtVal" class="value-display">200 мм</div>
    </div>

    <div class="result-box">
        <strong>Результат расчета:</strong>
        <div id="calcResult">Сила удержания: расчет...</div>
    </div>

    <canvas id="stabilityChart"></canvas>
</div>

<script>
    // Инициализация ВКонтакте
    vkBridge.send('VKWebAppInit');

    const inputs = ['depth', 'diameter', 'skirt'];
    const ctx = document.getElementById('stabilityChart').getContext('2d');
    
    let chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [0, 0.5, 1, 1.5, 2, 2.5, 3],
            datasets: [{
                label: 'Запас устойчивости (кг)',
                data: [0, 0, 0, 0, 0, 0, 0],
                borderColor: '#007bff',
                tension: 0.3,
                fill: true,
                backgroundColor: 'rgba(0, 123, 255, 0.1)'
            }]
        },
        options: { responsive: true, scales: { y: { beginAtZero: true } } }
    });

    function update() {
        const d = parseFloat(document.getElementById('depth').value);
        const dia = parseFloat(document.getElementById('diameter').value);
        const s = parseFloat(document.getElementById('skirt').value) / 1000;

        document.getElementById('depthVal').innerText = d + ' м';
        document.getElementById('diamVal').innerText = dia + ' м';
        document.getElementById('skirtVal').innerText = (s * 1000) + ' мм';

        // Упрощенная инженерная логика: объем вытесненной воды vs вес грунта на юбке
        const volume = Math.PI * Math.pow(dia/2, 2) * d;
        const archimedesForce = volume * 1000;
        const skirtArea = Math.PI * (Math.pow((dia/2 + s), 2) - Math.pow(dia/2, 2));
        const soilWeight = skirtArea * d * 1600; // Плотность грунта ~1600 кг/м3

        const totalHolding = soilWeight;
        const safetyFactor = (totalHolding / archimedesForce).toFixed(2);

        document.getElementById('calcResult').innerHTML = `
            Сила Архимеда: <b>${Math.round(archimedesForce)} кг</b><br>
            Удержание грунтом: <b>${Math.round(totalHolding)} кг</b><br>
            Коэффициент запаса: <span style="color: ${safetyFactor > 1.2 ? 'green' : 'red'}">${safetyFactor}</span>
        `;

        // Обновление графика
        chart.data.datasets[0].data = chart.data.labels.map(l => Math.round(skirtArea * l * 1600));
        chart.update();
    }

    inputs.forEach(id => document.getElementById(id).addEventListener('input', update));
    update();
</script>

</body>
</html>
